<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보물 숨길 장소</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="hide-place">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" type="button" onclick="history.back()">← 뒤로가기</button>
      <div class="header-title">
        <h1>보물 숨길 장소 선택하기</h1>
      </div>
      <span></span>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <p>다음 장소 중 하나를 선택하면 미션 유형을 정할 수 있어요.</p>
    </section>

    </section>

    <div class="grid-list">
      <button onclick="finalUpload(1)" class="secondary">도서관</button>
      <button onclick="finalUpload(2)" class="secondary">학생회관</button>
      <button onclick="finalUpload(3)" class="secondary">종합관</button>
      <button onclick="finalUpload(4)" class="secondary">아마랜스홀</button>
      <button onclick="finalUpload(5)" class="secondary">정문</button>
      <button onclick="finalUpload(6)" class="secondary">미래혁신관</button>
      <button onclick="finalUpload(7)" class="secondary">인문사회융합대학</button>
      <button onclick="finalUpload(8)" class="secondary">ICT융합대학</button>
      <button onclick="finalUpload(9)" class="secondary">야구장</button>
      <button onclick="finalUpload(10)" class="secondary">대운동장</button>
    </div>

    <script src="treasure.js"></script>
    <script>
      async function finalUpload(locId) {
        // 1. 이전 페이지(meme.html 등)에서 저장한 이미지/데이터 가져오기
        const tempImage = localStorage.getItem("temp_image");
        const tempType = localStorage.getItem("temp_type") || "meme";
        const tempContent = localStorage.getItem("temp_content") || "보물을 찾아보세요!";

        if (!tempImage) {
          alert("사진 데이터가 없습니다. 다시 등록해주세요.");
          location.href = 'choose.html';
          return;
        }

        // 2. Base64 이미지를 서버 전송용 파일로 변환
        const blob = await (await fetch(tempImage)).blob();
        const file = new File([blob], "upload.png", { type: "image/png" });

        // 3. 서버 전송 데이터 준비
        const info = JSON.parse(localStorage.getItem("participantInfo") || "{}");
        const params = new URLSearchParams();
        params.append("location_id", locId); // 지금 클릭한 장소 ID
        params.append("treasure_type", tempType);
        params.append("mission_content", tempContent);
        params.append("name", info.name || "익명");
        params.append("student_id", info.studentId || "00000000");
        params.append("department", info.department || "미지정");
        params.append("mission_type", "quiz");
        params.append("mission_answer", "정답");

        const formData = new FormData();
        formData.append("image", file);

        try {
          const url = `${API_BASE}/treasures?${params.toString()}`;
          const res = await fetch(url, { method: "POST", body: formData });

          if (res.ok) {
            alert("등록 성공!");
            // ⭐ 중요: 여기서 다시 장소 선택으로 보내면 안 됨! '완료' 페이지로 이동.
            location.href = 'hide-complete.html';
          } else {
            alert("서버 전송 실패");
          }
        } catch (err) {
          console.error(err);
          alert("네트워크 오류");
        }
      }
    </script>
  </main>
</body>

</html>
