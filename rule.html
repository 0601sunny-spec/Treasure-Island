<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>규칙 설명</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="rule">
  <header class="site-header">
    <div class="header-top">
      <span></span>
      <div class="header-title">
        <h1>규칙 설명</h1>
        <p class="subtitle">보물찾기 게임의 진행 방식과 주의사항을 확인하세요.</p>
      </div>
      <button class="text-link close-button" onclick="location.href='treasure.html'">×</button>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <h2>게임 순서</h2>
      <ol>
        <li>지도에서 장소를 선택합니다.</li>
        <li>미션 내용을 확인하고 정답을 제출합니다.</li>
        <li>인증 성공 시 보물을 획득합니다.</li>
        <li>직접 보물을 숨기고 다른 학생에게 전달할 수도 있습니다.</li>
      </ol>
    </section>

    <section class="info-card">
      <h2>주의사항</h2>
      <ul>
        <li>정답 제출은 서버와 연결해야 정상적으로 판별됩니다.</li>
        <li>사진 인증 기능은 서버에서 업로드 처리가 필요합니다.</li>
        <li>보물 숨기기 정보는 닉네임, 학과, 장소, 미션, 정답을 정확히 입력해야 합니다.</li>
      </ul>
    </section>

    <div class="button-row">
      <button onclick="location.href='treasure.html'" class="secondary">홈으로</button>
      <button onclick="location.href='map.html'" class="secondary">지도 보기</button>
    </div>

    <section class="support-row">
      <a href="https://open.kakao.com/o/sW4xEyqi" target="_blank" class="report-button">문의하기</a>
    </section>
  </main>
</body>

</html>
