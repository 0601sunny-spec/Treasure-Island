<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퀴즈 미션 내용 입력</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="quiz-content">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" type="button" onclick="history.back()">← 뒤로가기</button>
      <h1>퀴즈형 미션 내용 입력</h1>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <p>ex. 중앙도서관에서 책을 빌릴 수 있는 데스크는 몇 층에 있는가?</p>
      <hr>
      <p class="highlight-text" style="color: blue;">tip. 해당 건물 전공생만이 알 수 있는 퀴즈</p>
    </section>

    <div class="oval-card">
      <input type="text" id="quizQuestion" placeholder="퀴즈 문제를 입력하세요" class="text-input" style="margin-bottom: 15px;">

      <input type="text" id="quizAnswer" placeholder="정답을 입력하세요" class="text-input" style="margin-bottom: 15px;">

      <button onclick="submitFinalTreasure()" class="primary hero-button">보물 등록 완료!</button>
    </div>
  </main>

  <script src="treasure.js"></script>
<script>
  async function submitFinalTreasure() {
    // 1. 입력창 데이터 읽기
    const question = document.getElementById('quizQuestion').value;
    const answer = document.getElementById('quizAnswer').value;

    if (!question || !answer) {
      alert("문제와 정답을 모두 입력해주세요!");
      return;
    }

    // 2. 저장된 데이터 불러오기 (없을 경우를 대비한 기본값 설정)
    const tempImage = localStorage.getItem("temp_image");
    const locId = localStorage.getItem("selectedLocationId") || "1"; // 장소 ID가 없으면 '1'이라도 보냄
    const type = localStorage.getItem("temp_type") || "meme";       // 유형이 없으면 'meme'이라도 보냄
    const infoRaw = localStorage.getItem("participantInfo");
    const info = infoRaw ? JSON.parse(infoRaw) : { name: "익명", studentId: "00000000", department: "미지정" };

    if (!tempImage) {
      alert("등록할 사진이 없습니다. 처음부터 다시 시도해주세요.");
      location.href = 'choose.html';
      return;
    }

    // [중요] 전송 전 데이터 최종 확인 (알림창으로 띄워줌)
    console.log("전송 데이터 확인:", { locId, type, question, answer });

    try {
      // 3. 사진 데이터 변환
      const blob = await (await fetch(tempImage)).blob();
      const file = new File([blob], "treasure.png", { type: "image/png" });

      // 4. 서버가 요구하는 정확한 필드명으로 조립
      const params = new URLSearchParams();
      params.append("location_id", locId);          // 관리자 페이지 '장소'
      params.append("treasure_type", type);         // 관리자 페이지 '유형' (meme 또는 gifticon)
      params.append("mission_content", question);   // 관리자 페이지 '내용' (퀴즈 문제)
      params.append("mission_answer", answer);      // 퀴즈 정답
      params.append("name", info.name || "익명");    // 관리자 페이지 '닉네임'
      params.append("student_id", info.studentId || "00000000");
      params.append("department", info.department || "미지정");
      params.append("mission_type", "quiz");

      const formData = new FormData();
      formData.append("image", file);

      // 5. 서버 전송
      const url = `${API_BASE}/treasures?${params.toString()}`;
      const res = await fetch(url, { method: "POST", body: formData });

      if (res.ok) {
        alert("보물 등록에 성공했습니다!");
        // 성공 시 임시 데이터 삭제
        localStorage.removeItem("temp_image");
        localStorage.removeItem("selectedLocationId");
        location.href = 'hide-complete.html';
      } else {
        const errorMsg = await res.text();
        alert(`서버 전송 실패: ${res.status}\n메시지: ${errorMsg}`);
      }
    } catch (err) {
      console.error(err);
      alert("네트워크 오류가 발생했습니다.");
    }
  }
</script>
</body>

</html>
