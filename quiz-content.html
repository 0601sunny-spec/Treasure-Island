<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퀴즈 미션 내용 입력</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="quiz-content">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" type="button" onclick="history.back()">← 뒤로가기</button>
      <h1>퀴즈형 미션 내용 입력</h1>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <p>ex. 중앙도서관에서 책을 빌릴 수 있는 데스크는 몇 층에 있는가?</p>
      <hr>
      <p class="highlight-text" style="color: blue;">tip. 해당 건물 전공생만이 알 수 있는 퀴즈</p>
    </section>

    <div class="oval-card">
      <input type="text" id="quizQuestion" placeholder="퀴즈 문제를 입력하세요" class="text-input" style="margin-bottom: 15px;">

      <input type="text" id="quizAnswer" placeholder="정답을 입력하세요" class="text-input" style="margin-bottom: 15px;">

      <button onclick="submitFinalTreasure()" class="primary hero-button">보물 등록 완료!</button>
    </div>
  </main>

  <script src="treasure.js"></script>
  <script>
    async function submitFinalTreasure() {
      const question = document.getElementById('quizQuestion').value;
      const answer = document.getElementById('quizAnswer').value;

      // 1. 데이터 가져오기
      const tempImage = localStorage.getItem("temp_image");
      const locId = localStorage.getItem("selectedLocationId");
      const type = localStorage.getItem("temp_type") || "meme";

      // 참가자 정보가 없으면 기본값이라도 넣어야 422 에러가 안 납니다.
      const infoRaw = localStorage.getItem("participantInfo");
      const info = infoRaw ? JSON.parse(infoRaw) : { name: "익명", studentId: "00000000", department: "미지정" };

      if (!tempImage) {
        alert("사진이 없습니다.");
        return;
      }

      try {
        const blob = await (await fetch(tempImage)).blob();
        const file = new File([blob], "treasure.png", { type: "image/png" });

        const params = new URLSearchParams();
        // 서버가 요구하는 정확한 필드명인지 다시 확인이 필요할 수 있습니다.
        params.append("location_id", locId || "1");
        params.append("treasure_type", type);
        params.append("mission_content", question);
        params.append("mission_answer", answer);
        params.append("name", info.name || "익명");
        params.append("student_id", info.studentId || "20240001"); // 학번 형식이 틀려도 422가 날 수 있음
        params.append("department", info.department || "컴퓨터공학");
        params.append("mission_type", "quiz");

        const formData = new FormData();
        formData.append("image", file);

        // 🚩 URL 확인: API_BASE가 제대로 안 잡혀있으면 직접 주소를 넣으세요.
        const url = `https://dopamine-treasure-backend-production.up.railway.app/treasures?${params.toString()}`;

        const res = await fetch(url, {
          method: "POST",
          body: formData
        });

        if (res.ok) {
          alert("보물 등록 완료!");
          location.href = 'hide-complete.html';
        } else {
          // 서버에서 왜 거절했는지 에러 메시지를 읽어옵니다.
          const errorText = await res.text();
          console.error("서버 에러 상세:", errorText);
          alert("등록 실패 (422): 서버가 요구하는 데이터 형식이 맞지 않습니다.");
        }
      } catch (err) {
        console.error(err);
        alert("네트워크 오류");
      }
    }
  </script>
</body>

</html>
