<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="treasure.css">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=09908d11be5c72a305888f7bd706fc05"></script>
  <title>캠퍼스 지도</title>
</head>

<body data-page="map">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" onclick="location.href='treasure.html'">← 뒤로가기</button>
      <div class="header-title">
        <h1>수원대 실시간 보물맵</h1>
        <p class="subtitle">실시간 잔여 보물 현황을 확인하세요.</p>
      </div>
      <span></span>
    </div>
  </header>

  <main class="page-content">
    <section class="map-panel">
      <div id="mapContainer" style="width:100%;height:400px;"></div>
      <div id="mapPoints" class="map-points"></div>
    </section>

    <section id="participantSummary" class="info-card">
      <h2>참여자 정보</h2>
      <p>보물찾기 시작 전 참여자 정보를 입력해 주세요.</p>
    </section>

    <section class="location-panel">
      <h2>실시간 보물 현황</h2>
      <div id="locationList" class="grid-list"></div>
      <p id="emptyState" class="empty-state">장소 정보를 불러오는 중입니다...</p>
    </section>

    <div class="button-row">
      <button onclick="location.href='treasure.html'" class="secondary">홈으로</button>
    </div>

    <section class="support-row">
      <a href="https://open.kakao.com/o/sW4xEyqi" target="_blank" class="report-button">문의하기</a>
    </section>
  </main>

  <script src="treasure.js"></script>
</body>

</html>
