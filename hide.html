<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보물 숨기기</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="hide">
  <header class="site-header">
    <div class="header-top">
      <span></span>
      <div class="header-title">
        <h1>보물 숨기기</h1>
        <p class="subtitle">캠퍼스에 숨길 보물을 등록하고 미션을 만들어보세요.</p>
      </div>
      <button class="text-link close-button" onclick="location.href='treasure.html'">×</button>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <h2>정보입력</h2>
    </section>
    <section class="form-card">
      <form id="hideForm">
        <label>이름
          <input id="hideNickname" placeholder="이름" required>
        </label>

        <label>학과
          <input id="hideDepartment" placeholder="학과" required>
        </label>

        <label>학번
          <input id="hideStudentId" placeholder="학번" required>
        </label>

        <label>장소 선택
          <select id="hideLocation" required>
            <option value="1">도서관</option>
            <option value="2">학생회관</option>
            <option value="3">종합관</option>
            <option value="4">아마랜스홀</option>
            <option value="5">정문</option>
            <option value="6">미래혁신관</option>
            <option value="7">인문사회융합대학</option>
            <option value="8">ICT융합대학</option>
            <option value="9">야구장</option>
            <option value="10">대운동장</option>
          </select>
        </label>

        <label>보물 유형
          <select id="hideType" required>
            <option value="message">응원 메시지</option>
            <option value="gifticon">기프티콘</option>
            <option value="meme">짤</option>
          </select>
        </label>

        <label>내용
          <input id="hideContent" placeholder="메시지 또는 기프티콘 설명" required>
        </label>

        <label>미션 질문
          <input id="hideMission" placeholder="미션 질문" required>
          <select id="hideMissionType" required>
            <option value="quiz">퀴즈</option>
            <option value="photo">사진 인증</option>
          </select>
        </label>

        <label>미션 정답
          <input id="hideAnswer" placeholder="정답" required>
        </label>

        <button type="submit" class="primary">보물 숨기기</button>
      </form>

      <div id="hideResult" class="notice-box" style="display:none;"></div>
    </section>

    <div class="button-row">
      <button onclick="location.href='treasure.html'" class="secondary">홈으로</button>
      <button onclick="location.href='map.html'" class="secondary">찾으러 가기</button>
      <button onclick="location.href='hide.html'" class="secondary">하나더 숨기기</button>

    </div>

    <section class="support-row">
      <a href="https://open.kakao.com/o/sW4xEyqi" target="_blank" class="report-button">문의하기</a>
    </section>
  </main>

  <script src="treasure.js"></script>
</body>

</html>
