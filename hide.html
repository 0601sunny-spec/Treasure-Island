<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보물 숨기기</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body>

<h1>보물 숨기기</h1>

<div class="container">

  <input id="name" placeholder="이름">
  <input id="studentId" placeholder="학번">
  <input id="department" placeholder="학과">

  <select id="locationId">
    <option value="1">도서관</option>
    <option value="2">학생회관</option>
    <option value="3">종합관</option>
    <option value="4">아마랜스홀</option>
    <option value="5">정문</option>
    <option value="6">미래혁신관</option>
    <option value="7">인문사회융합대학</option>
    <option value="8">ICT융합대학</option>
    <option value="9">야구장</option>
    <option value="10">대운동장</option>
  </select>

  <select id="treasureType">
    <option value="message">응원 메시지</option>
    <option value="gifticon">기프티콘</option>
  </select>

  <input id="content" placeholder="메시지 or 기프티콘 설명">

  <input id="question" placeholder="미션 질문">
  <input id="answer" placeholder="정답">

  <button id="hideSubmit">보물 숨기기</button>

</div>
        <img src="map_img.jpg" id="mapImage">

<script src="treasure.js"></script>
</body>
</html>
