<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미션: 사진 인증</title>
    <link rel="stylesheet" href="2-1.css">
</head>
<body class="mission-body">
    <header class="header">
        <button class="back-btn" onclick="history.back()"><img src="./img/back.png"></button>
        <div class="logo-container"><img src="./img/bennerminilogo.png" class="logo"></div>
    </header>

    <main class="mission-content">
        <div class="mission-card">
            <h2 id="location-name">장소 로딩 중...</h2>
            <div class="mission-box">
                <p class="mission-label">PHOTO MISSION</p>
                <p id="mission-text" class="mission-text">인증샷을 촬영하여 업로드해주세요!</p>
            </div>

            <div class="file-upload-area" onclick="document.getElementById('photo-file').click()">
                <img src="./img/camera_icon.png" id="preview-img" style="width: 50px;">
                <p id="file-name">사진 선택 또는 촬영</p>
            </div>
            <input type="file" id="photo-file" accept="image/*" style="display:none;" onchange="updateFileName(this)">
            
            <button class="submit-btn" onclick="submitPhoto()">사진 제출</button>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const locationId = urlParams.get('id');

        function updateFileName(input) {
            if (input.files && input.files[0]) {
                document.getElementById('file-name').innerText = input.files[0].name;
            }
        }

        async function submitPhoto() {
            const fileInput = document.getElementById('photo-file');
            if(!fileInput.files[0]) return alert("사진을 업로드해주세요!");

            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            
            const formData = new FormData();
            formData.append('name', userInfo.name);
            formData.append('student_id', userInfo.student_id);
            formData.append('department', userInfo.department);
            formData.append('phone', userInfo.phone);
            formData.append('agreed', true);
            formData.append('mission_type', 'photo');
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch(`/locations/${locationId}/verify`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if(result.success) {
                    // 사진 미션은 관리자 승인 대기 단계로 이동
                    location.href = "2-1-phone.html?status=pending";
                }
            } catch (error) {
                alert("업로드 실패");
            }
        }
    </script>
</body>
</html>
