<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 입력</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="meme">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" type="button" onclick="history.back()">← 뒤로가기</button>
      <div class="header-title">
        <h1>자존감 올려주는 짤 등록하기</h1>
      </div>
      <span></span>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <p>사진 업로드 버튼을 눌러 카메라/갤러리에서 짤을 선택해주세요.</p>
    </section>

    <div class="oval-card">
      <input type="file" id="memeInput" accept="image/*" style="display:none;">

      <div id="previewContainer" style="display:none; margin-bottom: 20px;">
        <img id="imagePreview" src="" alt="미리보기"
          style="width: 100%; max-width: 200px; border-radius: 10px; border: 2px solid #ddd;">
      </div>

      <button class="secondary hero-button" type="button" onclick="document.getElementById('memeInput').click()">
        사진 업로드
      </button>

      <button id="okButton" class="primary hero-button">OK</button>
    </div>

    <script>
      const memeInput = document.getElementById('memeInput');
      const imagePreview = document.getElementById('imagePreview');
      const previewContainer = document.getElementById('previewContainer');
      const okButton = document.getElementById('okButton');

      // 파일이 선택되었을 때 실행
      memeInput.addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();

          reader.onload = function (e) {
            imagePreview.src = e.target.result;
            previewContainer.style.display = 'block'; // 미리보기 보이기
          }

          reader.readAsDataURL(file);
        }
      });

      // OK 버튼 클릭 시 동작
      okButton.addEventListener('click', function () {
        if (memeInput.files.length === 0) {
          alert('사진을 먼저 업로드해주세요!');
        } else {
          // 사진이 있으면 다음 페이지로 이동
          location.href = 'hide-place.html';
        }
      });
    </script>
  </main>
</body>

</html>
