<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 입력</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="meme">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" type="button" onclick="history.back()">← 뒤로가기</button>
      <div class="header-title">
        <h1>자존감 올려주는 짤 등록하기</h1>
      </div>
      <span></span>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <p>사진 업로드 버튼을 눌러 카메라/갤러리에서 짤을 선택해주세요.</p>
    </section>

    <div class="oval-card">
      <input type="file" id="memeInput" accept="image/*" style="display:none;">

      <div id="previewContainer" style="display:none; margin-bottom: 20px;">
        <img id="imagePreview" src="" alt="미리보기"
          style="width: 100%; max-width: 200px; border-radius: 10px; border: 2px solid #ddd;">
      </div>

      <button class="secondary hero-button" type="button" onclick="document.getElementById('memeInput').click()">
        사진 업로드
      </button>

      <button id="okButton" class="primary hero-button">OK</button>
    </div>

    <script src="treasure.js"></script>
    <script>
      // 1. 변수 선언 (딱 한 번만 선언해야 합니다)
      const memeInput = document.getElementById('memeInput');
      const imagePreview = document.getElementById('imagePreview');
      const previewContainer = document.getElementById('previewContainer');
      const okButton = document.getElementById('okButton');

      // 2. 사진 선택 시 미리보기 로직
      memeInput.addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            imagePreview.src = e.target.result;
            previewContainer.style.display = 'block';
          }
          reader.readAsDataURL(file);
        }
      });

      // 3. OK 버튼 클릭 시 서버 전송 로직
      okButton.addEventListener('click', async function () {
        const file = memeInput.files[0];
        if (!file) {
          alert('사진을 먼저 업로드해주세요!');
          return;
        }

        const info = typeof getParticipantInfo === 'function' ? getParticipantInfo() : null;

        const params = new URLSearchParams({
          name: String(info?.name || "익명"),
          student_id: String(info?.studentId || info?.student_id || "00000000"),
          department: String(info?.department || "미지정"),
          location_id: parseInt(localStorage.getItem("selectedLocationId") || "1", 10),
          treasure_type: "meme",
          mission_type: "quiz",
          mission_content: "자존감 올려주는 짤 찾기!",
          mission_answer: "정답",
          status: "approved"
        });

        const formData = new FormData();
        formData.append("image", file);

        try {
          // 주소 끝에 붙은 [cite: 76] 같은 건 다 지워야 합니다.
          const url = `${API_BASE}/treasures?${params.toString()}`;

          const res = await fetch(url, {
            method: "POST",
            body: formData
          });

          if (res.ok) {
            alert("짤이 성공적으로 등록되었습니다!");
            location.href = 'hide-place.html';
          } else {
            const errorData = await res.json();
            alert("등록 실패! 데이터를 확인해주세요.");
          }
        } catch (err) {
          console.error("네트워크 에러:", err);
          alert("서버 연결에 실패했습니다.");
        }
      });
    </script>
  </main>
</body>

</html>
