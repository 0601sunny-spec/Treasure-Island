<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 입력</title>
  <link rel="stylesheet" href="treasure.css">
</head>
<body data-page="meme">
  <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" type="button" onclick="history.back()">← 뒤로가기</button>
      <h1>자존감 짤 등록</h1>
    </div>
  </header>

  <main class="page-content">
    <div class="oval-card">
      <input type="file" id="memeInput" accept="image/*" style="display:none;">
      <div id="previewContainer" style="display:none; margin-bottom: 20px;">
        <img id="imagePreview" src="" alt="미리보기" style="width: 100%; max-width: 200px; border-radius: 10px;">
      </div>
      <button class="secondary hero-button" onclick="document.getElementById('memeInput').click()">사진 업로드</button>
      <button id="nextButton" class="primary hero-button">장소 선택하러 가기</button>
    </div>
  </main>

  <script>
    const memeInput = document.getElementById('memeInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewContainer = document.getElementById('previewContainer');
    const nextButton = document.getElementById('nextButton');

    // 사진 미리보기 로직
    memeInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          imagePreview.src = event.target.result;
          previewContainer.style.display = 'block';
          // 1. 이미지를 Base64 형태로 임시 저장
          localStorage.setItem("temp_image", event.target.result);
        };
        reader.readAsDataURL(file);
      }
    });

    nextButton.addEventListener('click', function () {
      if (!memeInput.files[0]) {
        alert("사진을 먼저 등록해주세요!");
        return;
      }
      // 2. 유형과 내용을 임시 저장
      localStorage.setItem("temp_type", "meme");
      localStorage.setItem("temp_content", "자존감 올려주는 짤 찾기!");
      
      // 3. 장소 선택 페이지로 이동
      location.href = 'hide-place.html';
    });
  </script>
</body>
</html>
