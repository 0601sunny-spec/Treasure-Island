<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기프티콘 등록</title>
  <link rel="stylesheet" href="treasure.css">
</head>
<body data-page="gifticon"> <header class="site-header">
    <div class="header-top">
      <button class="text-link back-button" onclick="history.back()">← 뒤로가기</button>
      <h1>기프티콘 보물 등록</h1>
    </div>
  </header>

  <main class="page-content">
    <section class="info-card">
      <p>보물로 숨길 기프티콘 사진을 업로드해주세요.</p>
    </section>

    <div class="oval-card">
      <input type="file" id="gifticonInput" accept="image/*" style="display:none;">

      <div id="giftPreviewContainer" style="display:none; margin-bottom: 20px;">
        <img id="giftImagePreview" src="" alt="기프티콘 미리보기" style="width: 100%; max-width: 250px; border-radius: 15px; border: 2px solid #ff5a5f;">
      </div>

      <button class="secondary hero-button" type="button" onclick="document.getElementById('gifticonInput').click()">
        기프티콘 사진 선택
      </button>

      <button id="gifticonSubmit" class="primary hero-button">OK</button>
    </div>
  </main>

  <script src="treasure.js"></script>
</body>
</html>
