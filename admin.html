<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드</title>
  <link rel="stylesheet" href="treasure.css">
</head>

<body data-page="admin">
  <header class="site-header">
    <h1>관리자 대시보드</h1>
    <p class="subtitle">보물 현황, 등록된 보물 목록, 인증 시도 내역을 확인합니다.</p>
  </header>

  <main class="page-content admin-grid">
    <section class="admin-section form-card" id="adminLoginSection">
      <h2>관리자 로그인</h2>
      <label>관리자 비밀번호 입력
        <input id="adminPassword" type="password" placeholder="비밀번호를 입력하세요">
      </label>
      <button id="adminLoginBtn" class="primary">로그인</button>
      <div id="adminLoginError" class="notice-box" style="display:none; margin-top:12px;"></div>
    </section>

    <div id="adminContent" style="display:none;">
      <section class="admin-section info-card">
        <h2>장소별 보물 현황</h2>
        <div id="adminLocations">로딩 중...</div>
      </section>

      <section class="admin-section info-card">
        <h2>등록된 보물 목록</h2>
        <div id="adminTreasures">로딩 중...</div>
      </section>

      <section class="admin-section info-card">
        <h2>인증 시도 내역</h2>
        <div id="adminAttempts">로딩 중...</div>
      </section>
    </div>

    <div class="button-row">
      <button onclick="location.href='treasure.html'" class="secondary">홈으로</button>
      <button onclick="location.href='map.html'" class="secondary">지도 보기</button>
    </div>

    <section class="support-row">
      <a href="https://open.kakao.com/o/sW4xEyqi" target="_blank" class="report-button">문의하기</a>
    </section>
  </main>

  <script src="treasure.js"></script>
</body>

</html>
